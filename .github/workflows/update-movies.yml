name: Update Filtered Movies

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run movie filter script
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python3 filter_movies.py

      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add filtered_movies_radarr.json || true
          if ! git diff --cached --quiet; then
            BRANCH="claude/update-movies-$(date +%Y%m%d)"
            git checkout -b "$BRANCH"
            git commit -m "Update filtered movies [skip ci]"
            git push origin "$BRANCH"
            gh pr create --title "Update filtered movies $(date +%Y-%m-%d)" \
              --body "Automated daily TMDB update." \
              --base main --head "$BRANCH"
          else
            echo "No changes to commit"
          fi
