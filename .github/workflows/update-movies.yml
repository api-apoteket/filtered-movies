name: Update Filtered Movies

on:
  schedule:
    - cron: '0 6 * * *'  # Körs dagligen kl 06:00 UTC
  workflow_dispatch:      # Manuell körning möjlig

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run filter script
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python filter_movies.py

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add filtered_movies.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Auto-update filtered movies [skip ci]" && git push)
