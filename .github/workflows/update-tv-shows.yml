name: Update Filtered TV Shows

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run TV filter script
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python3 filter_tv_shows.py

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add filtered_tv_shows.json
          git stash
          git pull --rebase origin main
          git stash pop
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update filtered TV shows" && git push)
